<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROGNIX - Şehir Hayatı (Remastered)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Comic Sans MS', cursive; user-select: none; -webkit-tap-highlight-color: transparent; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; pointer-events: none; border: 2px solid #0084c7; font-size: 12px; z-index: 50; }
        #back-btn { position: absolute; top: 10px; right: 10px; padding: 10px 15px; background: #d9534f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 100; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; touch-action: none; z-index: 100; cursor: move; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; }
        #jump-btn { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border: 5px solid white; border-radius: 50%; color: white; font-weight: bold; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="ui"><h3>ŞEHİR HAYATI</h3><p>Şehri keşfet!</p></div>
    <button id="back-btn" onclick="location.href='games.html'">Geri Dön</button>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="jump-btn" onmousedown="triggerJump()" ontouchstart="triggerJump()">ZIPLA</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="avatar_loader.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(100, 200, 100); scene.add(sun);

        // Zemin ve Yollar
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI/2; scene.add(ground);

        // Çimenlik Alanlar
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x228B22}));
        grass.rotation.x = -Math.PI/2; grass.position.y = -0.1; scene.add(grass);

        const colliders = [];
        // Şehir Binaları
        for(let i=0; i<60; i++) {
            const h = 20 + Math.random()*60;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(15, h, 15),
                new THREE.MeshPhongMaterial({color: Math.random() * 0xffffff})
            );
            b.position.set(Math.random()*600-300, h/2, Math.random()*600-300);
            // Yolların üstüne gelmesin kontrolü (basit)
            if (Math.abs(b.position.x) < 20 || Math.abs(b.position.z) < 20) b.position.x += 40;
            scene.add(b);
            colliders.push(b);
        }

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        let parts = {};
        async function init() { parts = await loadPlayerAvatar(scene, playerGroup); }
        init();

        let vy = 0, isGrounded = true, cameraRotation = 0, cameraPitch = 0.5, keys = {}, animTime = 0;
        let joystick = { x: 0, y: 0, active: false };

        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');
        function handleJoystick(e) {
            if (e.cancelable) e.preventDefault();
            const input = (e.touches && e.touches[0]) || e;
            const rect = container.getBoundingClientRect();
            const dx = input.clientX - (rect.left + rect.width / 2);
            const dy = input.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
            const angle = Math.atan2(dy, dx);
            const lx = Math.cos(angle) * dist, ly = Math.sin(angle) * dist;
            knob.style.transform = `translate(${lx}px, ${ly}px)`;
            joystick.x = lx / 45; joystick.y = ly / 45;
        }
        container.addEventListener('mousedown', e => { if(e.button===0) { joystick.active=true; handleJoystick(e); } });
        container.addEventListener('touchstart', e => { joystick.active=true; handleJoystick(e); });
        window.addEventListener('mousemove', e => { if(joystick.active) handleJoystick(e); });
        window.addEventListener('touchmove', e => { if(joystick.active) handleJoystick(e); }, {passive:false});
        const stopJoystick = () => { joystick.active=false; joystick.x=0; joystick.y=0; knob.style.transform='translate(0,0)'; };
        window.addEventListener('mouseup', stopJoystick); window.addEventListener('touchend', stopJoystick);

        function triggerJump() { if(isGrounded) { vy = 0.5; isGrounded = false; } }
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.code==='Space') triggerJump(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        let isRM = false; window.addEventListener('mousedown', e => { if(e.button===2) isRM=true; }); window.addEventListener('mouseup', e => { if(e.button===2) isRM=false; });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('mousemove', e => { if(isRM) { cameraRotation -= e.movementX*0.01; cameraPitch = Math.max(0.1, Math.min(1.4, cameraPitch+e.movementY*0.01)); } });

        function checkCollision(nx, nz) {
            const pBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(nx, playerGroup.position.y+5, nz), new THREE.Vector3(3, 10, 3));
            for(let c of colliders) {
                if(pBox.intersectsBox(new THREE.Box3().setFromObject(c))) return true;
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            let mx = 0, mz = 0;
            if(keys['w']) { mx -= Math.sin(cameraRotation); mz -= Math.cos(cameraRotation); }
            if(keys['s']) { mx += Math.sin(cameraRotation); mz += Math.cos(cameraRotation); }
            if(keys['a']) { mx -= Math.cos(cameraRotation); mz += Math.sin(cameraRotation); }
            if(keys['d']) { mx += Math.cos(cameraRotation); mz -= Math.sin(cameraRotation); }
            if(joystick.active) {
                mx = joystick.x * Math.cos(cameraRotation) + joystick.y * Math.sin(cameraRotation);
                mz = -joystick.x * Math.sin(cameraRotation) + joystick.y * Math.cos(cameraRotation);
            }

            const isMoving = (mx !== 0 || mz !== 0);
            if(isMoving) {
                playerGroup.rotation.y = Math.atan2(mx, mz);
                const nextX = playerGroup.position.x + mx * 0.5;
                const nextZ = playerGroup.position.z + mz * 0.5;
                if(!checkCollision(nextX, playerGroup.position.z)) playerGroup.position.x = nextX;
                if(!checkCollision(playerGroup.position.x, nextZ)) playerGroup.position.z = nextZ;
                animTime += 0.2;
            }

            vy -= 0.02; playerGroup.position.y += vy;
            if(playerGroup.position.y <= 0) { playerGroup.position.y=0; vy=0; isGrounded=true; }

            if(parts.leftLeg) {
                if(!isGrounded) {
                    parts.leftLeg.rotation.x = -0.5; parts.rightLeg.rotation.x = -0.5;
                } else if(isMoving) {
                    parts.leftLeg.rotation.x = Math.sin(animTime)*0.8; parts.rightLeg.rotation.x = -Math.sin(animTime)*0.8;
                    parts.leftArm.rotation.x = -Math.sin(animTime)*0.8; parts.rightArm.rotation.x = Math.sin(animTime)*0.8;
                } else {
                    parts.leftLeg.rotation.x = 0; parts.rightLeg.rotation.x = 0;
                    parts.leftArm.rotation.x = 0; parts.rightArm.rotation.x = 0;
                }
            }

            camera.position.x = playerGroup.position.x + Math.sin(cameraRotation)*30*Math.cos(cameraPitch);
            camera.position.z = playerGroup.position.z + Math.cos(cameraRotation)*30*Math.cos(cameraPitch);
            camera.position.y = playerGroup.position.y + 30*Math.sin(cameraPitch) + 10;
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 6, playerGroup.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
